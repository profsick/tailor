<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Your Order - Custom Tailors</title>
  <link href="styles.css" rel="stylesheet" />

  <script src="script.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">

</head>

<body class="order-page">
  <nav>
    <h1>LOGO</h1>
    <div class="nav-right">
      <a href="cart.html" class="contact-us">Back to Cart</a>
      <a href="orders.html" class="contact-us orders-link is-hidden">Your Orders</a>
    </div>
  </nav>

  <div class="order-container">

    <div class="order-summary" id="orderSummary">
      <h2>Order Summary</h2>
      <div id="summaryItems"></div>
    </div>

    <div class="measurements-review" id="measurementsReview" style="display: none;">
      <h2>Your Measurements</h2>
      <div id="reviewMeasurements" class="measurements-grid"></div>
      <a href="cart.html" class="edit-measurements-link">Edit Measurements</a>
    </div>

    <div class="order-banner pickup-banner">
      <p>
        <strong>📍 Pickup Service:</strong> Your order will be ready for pickup. We'll notify you once it's complete.
        <em>(Delivery service coming soon!)</em>
      </p>
    </div>

    <div id="orderConfirmation" class="order-banner order-confirmation is-hidden">
      <p>
        <strong>✅ Order placed successfully.</strong>
        We will call you when it is ready for pickup.
      </p>
    </div>

    <form id="orderForm">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="fullName" required placeholder="John Doe">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="john@example.com">
      </div>

      <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" name="phone" required placeholder="1234567890" pattern="[0-9]{10,}">
      </div>

      <div class="form-group">
        <label>Special Instructions</label>
        <textarea name="instructions" rows="3" placeholder="Any special requests or notes..."></textarea>
      </div>

      <button type="submit" class="submit-btn">Place Order</button>
    </form>
  </div>

</body>

</html>
