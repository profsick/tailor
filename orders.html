<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Orders - AURA</title>
  <link href="styles.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">

  <!-- Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="script.js" defer></script>
</head>

<body class="orders-page">
  <nav>
    <h1>AURA</h1>
    <div class="nav-right">
      <a href="index.html" class="contact-us">Back to Shop</a>
      <a href="cart.html" class="contact-us">View Cart</a>
    </div>
  </nav>

  <div class="orders-section">
    <div class="orders-wrapper">
      <h2>Your Orders</h2>
      <p class="orders-subtitle">Track your tailored pieces and order history</p>

      <div class="orders-actions">
        <button id="clearOrderHistoryBtn" class="clear-history-btn">Clear Order History</button>
      </div>

      <div id="ordersEmpty" class="orders-empty is-hidden">
        <p>You have not placed any orders yet.</p>
        <a href="index.html#clothing-section" class="primary-btn">Start Shopping</a>
      </div>

      <div id="ordersList" class="orders-list"></div>
    </div>
  </div>

  <footer>made by kashif</footer>
</body>

</html>
